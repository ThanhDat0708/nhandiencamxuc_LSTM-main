<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://nhandiencamxuclstm-ufgyhsghjbfrqjon9w2rsu.streamlit.app/">
  <title>Nhận Diện Cảm Xúc Từ Giọng Nói</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eaf2ff 0%, #f8fafc 45%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: min(680px, 100%);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(37, 99, 235, 0.12);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 32px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: white;
      color: var(--accent);
      border-color: rgba(37, 99, 235, 0.24);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Nhận diện cảm xúc từ giọng nói</h1>
    <p>
      GitHub Pages chỉ hiển thị trang tĩnh, nên trang này tự động chuyển bạn sang ứng dụng Streamlit đã deploy.
    </p>
    <p>Nếu trình duyệt không tự chuyển, hãy bấm nút bên dưới.</p>
    <div class="actions">
      <a class="button primary" href="https://nhandiencamxuclstm-ufgyhsghjbfrqjon9w2rsu.streamlit.app/">Mở ứng dụng</a>
      <a class="button secondary" href="README.md">Xem README</a>
    </div>
  </main>
</body>
</html>
